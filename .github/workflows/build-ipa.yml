name: Build IPA

on:
  push: { branches: [main] }
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode Project
        run: xcodegen generate
      - name: Build Archive
        run: >
          xcodebuild -project Stream.xcodeproj -scheme Stream -sdk iphoneos
          -configuration Release -archivePath Stream.xcarchive archive
          CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
      - name: Create IPA
        run: mkdir -p Payload && cp -r Stream.xcarchive/Products/Applications/Stream.app Payload/ && zip -r Stream.ipa Payload/
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Stream-iOS-v3
          path: Stream.ipa
